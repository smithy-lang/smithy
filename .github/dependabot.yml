version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    cooldown:
      default-days: 7
    labels:
     - "dependencies"
     - "no-changelog-needed"

  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    cooldown:
      default-days: 7
      exclude:
        - "software.amazon.smithy.gradle.smithy-jar"
    labels:
     - "dependencies"
     - "no-changelog-needed"
    groups:
      gradle:
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "com.opencastsoftware:prettier4j"
        versions: [ "0.3.1", "0.3.2" ]

  - package-ecosystem: "pip"
    directories:
      - "/docs"
      - "/.changes"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "10:00"
    cooldown:
      default-days: 7
    labels:
     - "dependencies"
     - "no-changelog-needed"
    groups:
      python:
        update-types:
          - "minor"
          - "patch"
